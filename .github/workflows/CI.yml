name: CI

on:
  pull_request:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  test:
    runs-on: [ubuntu-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Go
      uses: actions/setup-go@v2
      with:
        go-version: '1.21'
    - name: Install Protoc
      uses: arduino/setup-protoc@a8b67ba40b37d35169e222f3bb352603327985b6 # v2
    - run: git reset --hard
    - run: git clean -f -d
    - run: go test ./...

  build_and_deploy:
    runs-on: [ubuntu-latest]
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Go
      uses: actions/setup-go@v2
      with:
        go-version: '1.21'
    - run: git reset --hard
    - run: git clean -f -d
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@b508e2e3ef3b19d4e4146d4f8fb3ba9db644a757 # v3.2.0
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
