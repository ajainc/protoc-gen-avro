syntax = "proto3";

package avro;

option go_package = "github.com/ajainc/protoc-gen-avro/avropb;avropb";

import "google/protobuf/descriptor.proto";

// AvroFieldOptions allows specifying Avro-specific metadata on proto fields.
// This is used to generate Avro logicalType annotations (e.g. decimal).
message AvroFieldOptions {
  // Avro logicalType (e.g. "decimal", "timestamp-millis")
  string logical_type = 1;

  // Precision for decimal logicalType
  int32 precision = 2;

  // Scale for decimal logicalType
  int32 scale = 3;

  // Size in bytes for Avro fixed type
  int32 fixed_size = 4;

  // Explicit name for the Avro fixed type.
  // If omitted, a deterministic name is auto-generated (e.g. "Decimal38_9").
  string name = 5;

  // Override the Avro field name.
  // If omitted, the Proto field name is used.
  string field_name = 6;
}

// AvroFileOptions allows specifying Avro-specific metadata at file level.
message AvroFileOptions {
  // Avro namespace for top-level records in this file.
  // Overrides the namespace_map plugin parameter for this file.
  string namespace = 1;
}

// AvroMessageOptions allows specifying Avro-specific metadata at message level.
message AvroMessageOptions {
  // Override the Avro record name.
  // If omitted, the Proto message name is used.
  // Useful when the Proto message name must differ from the desired Avro record name
  // (e.g. to avoid name collisions within the same Proto package).
  string name = 1;
}

extend google.protobuf.FieldOptions {
  AvroFieldOptions avro = 50001;
}

extend google.protobuf.FileOptions {
  AvroFileOptions avro_file = 50002;
}

extend google.protobuf.MessageOptions {
  AvroMessageOptions avro_message = 50003;
}
